{% extends "base.html" %}

{% block title %}Đăng nhập{% endblock %}
{% block page_title %}Đăng nhập{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h2>Chào mừng quay lại</h2>
        <p>Đăng nhập để truy cập hệ thống quản lý lớp học.</p>

        <form method="post">
            <label>Email</label>
            <input type="email" name="email" placeholder="email@example.com" required>

            <label>Mật khẩu</label>
            <input type="password" name="password" placeholder="••••••••" required>

            <button class="btn btn-primary full-width" type="submit">Đăng nhập</button>
        </form>
    </div>
</div>
{% endblock %}
